services:
  mongodb:
    image: mongo:7.0
    container_name: plant_disease_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-plant_disease_db}
    volumes:
      - mongodb_data:/data/db
    networks:
      - plant_disease_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-server:
    image: plant-disease-api:latest
    # Build this image on the EC2 host from the uploaded source:
    # docker build -t plant-disease-api:latest -f docker/Dockerfile.server .
    container_name: plant_disease_api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/plant_disease_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://app.example.com}
      - TRUST_PROXY=${TRUST_PROXY:-true}
      - JWT_SECRET=${JWT_SECRET}
      - PUBLIC_IP=${PUBLIC_IP:-api.example.com}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
    volumes:
      - ./runs:/app/runs:ro
      - ./server/uploads:/app/server/uploads
      - ./python/temp_uploads:/app/python/temp_uploads
    ports:
      # Keep the app private to the host. Nginx on EC2 should proxy to this port.
      - "127.0.0.1:3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - plant_disease_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  plant_disease_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
